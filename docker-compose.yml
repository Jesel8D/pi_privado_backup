# ============================================================
# TienditaCampus - Docker Compose (Base)
# ============================================================
# Uso:
#   Desarrollo: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Producción: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ─── Frontend (Next.js 14 PWA) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../devops/docker/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    networks:
      - tc-network
    depends_on:
      backend:
        condition: service_healthy

  # ─── Backend (NestJS API) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../devops/docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - BACKEND_PORT=${BACKEND_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - ARGON2_MEMORY_COST=${ARGON2_MEMORY_COST}
      - ARGON2_TIME_COST=${ARGON2_TIME_COST}
      - ARGON2_PARALLELISM=${ARGON2_PARALLELISM}
      - MONGO_URI=mongodb://mongodb:27017/tienditacampus_logs
    expose:
      - "${BACKEND_PORT:-3001}"
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_HOST_PORT:-3001}:${BACKEND_PORT:-3001}"
    networks:
      - tc-network
    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:${BACKEND_PORT}/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Database (PostgreSQL 16) ──────────────────────────────
  database:
    build:
      context: ./database
      dockerfile: ../devops/docker/database/Dockerfile
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: [ "postgres", "-c", "shared_preload_libraries=pg_stat_statements" ]
    volumes:
      - tc-pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - tc-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MongoDB (NoSQL — Base de datos no relacional) ─────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - tc-mongodata:/data/db
    networks:
      - tc-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  # ─── Nginx (Reverse Proxy) ────────────────────────────────
  nginx:
    build:
      context: ./devops/docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    networks:
      - tc-network
    depends_on:
      - frontend
      - backend

networks:
  tc-network:
    driver: bridge

volumes:
  tc-pgdata:
  tc-mongodata:
